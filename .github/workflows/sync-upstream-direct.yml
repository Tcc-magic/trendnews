name: Sync Upstream to Master
run-name: Sync upstream to master

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: write

concurrency:
  group: sync-upstream-direct-master
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/sansan0/TrendRadar.git
          git fetch upstream --prune

      - name: Checkout local master
        run: |
          git checkout master
          git pull origin master

      - name: Check if upstream has new commits
        id: check
        run: |
          LOCAL=$(git rev-parse HEAD)
          if git show-ref --verify --quiet refs/remotes/upstream/master; then
            UPSTREAM_REF="upstream/master"
          elif git show-ref --verify --quiet refs/remotes/upstream/main; then
            UPSTREAM_REF="upstream/main"
          else
            echo "Error: upstream branch not found (expected upstream/master or upstream/main)."
            exit 1
          fi
          UPSTREAM=$(git rev-parse "$UPSTREAM_REF")

          echo "local=$LOCAL" >> "$GITHUB_OUTPUT"
          echo "upstream=$UPSTREAM" >> "$GITHUB_OUTPUT"
          echo "upstream_ref=$UPSTREAM_REF" >> "$GITHUB_OUTPUT"

          if [ "$LOCAL" = "$UPSTREAM" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No upstream changes."
          elif git merge-base --is-ancestor "$LOCAL" "$UPSTREAM"; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Fast-forward or normal merge needed."
          elif git merge-base --is-ancestor "$UPSTREAM" "$LOCAL"; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "Local master is already ahead of upstream."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Branches have diverged; merge needed."
          fi

      - name: Merge upstream with workflow filtering
        id: merge
        if: steps.check.outputs.has_changes == 'true'
        run: |
          set -euo pipefail

          if ! git merge "${{ steps.check.outputs.upstream_ref }}" --no-commit --allow-unrelated-histories; then
            echo "merge_conflict=true" >> "$GITHUB_OUTPUT"
            echo "Merge conflict detected. Abort automatic sync to avoid publishing a partial merge."
            CONFLICT_FILES=$(git diff --name-only --diff-filter=U || true)
            {
              echo "conflict_files<<EOF"
              printf "%s\n" "$CONFLICT_FILES"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            if [ -n "$CONFLICT_FILES" ]; then
              echo "Conflict files:"
              printf "%s\n" "$CONFLICT_FILES"
            fi
            git merge --abort || true
            exit 1
          fi
          echo "merge_conflict=false" >> "$GITHUB_OUTPUT"

          # 对齐主程序版本标识，避免自动合并后保留本地旧版本号。
          UPSTREAM_REF="${{ steps.check.outputs.upstream_ref }}" python3 - <<'PY'
          import os
          import re
          import subprocess
          from pathlib import Path

          upstream_ref = os.environ["UPSTREAM_REF"]
          version_pattern = re.compile(r"\d+\.\d+\.\d+")

          def read_upstream(path: str) -> str:
              result = subprocess.run(
                  ["git", "show", f"{upstream_ref}:{path}"],
                  check=False,
                  stdout=subprocess.PIPE,
                  stderr=subprocess.DEVNULL,
                  text=True,
              )
              return result.stdout if result.returncode == 0 else ""

          def find_version(text: str) -> str:
              match = version_pattern.search(text)
              return match.group(0) if match else ""

          upstream_version = find_version(read_upstream("version"))
          if not upstream_version:
              upstream_version = find_version(read_upstream("trendradar/__init__.py"))

          if not upstream_version:
              print("Warning: failed to parse upstream program version; skip version alignment.")
              raise SystemExit(0)

          def replace_once(path: Path, pattern: str, replacement: str) -> bool:
              original = path.read_text(encoding="utf-8")
              updated, count = re.subn(pattern, replacement, original, count=1, flags=re.MULTILINE)
              if count == 0:
                  print(f"Warning: failed to match version pattern in {path}")
                  return False
              if updated != original:
                  path.write_text(updated, encoding="utf-8")
                  print(f"Aligned {path} to {upstream_version}")
                  return True
              print(f"{path} already aligned to {upstream_version}")
              return False

          changed = 0
          version_file = Path("version")
          if version_file.exists():
              version_text = version_file.read_text(encoding="utf-8")
              updated_version_text = f"{upstream_version}\n"
              if version_text != updated_version_text:
                  version_file.write_text(updated_version_text, encoding="utf-8")
                  changed += 1
                  print(f"Aligned {version_file} to {upstream_version}")
              else:
                  print(f"{version_file} already aligned to {upstream_version}")
          else:
              print("Warning: version file not found; skip.")

          replacements = {
              Path("trendradar/__init__.py"): (
                  r'^__version__\s*=\s*"\d+\.\d+\.\d+"',
                  f'__version__ = "{upstream_version}"',
              ),
              Path("pyproject.toml"): (
                  r'^version\s*=\s*"\d+\.\d+\.\d+"',
                  f'version = "{upstream_version}"',
              ),
              Path("README.md"): (
                  r"version-v\d+\.\d+\.\d+-blue\.svg",
                  f"version-v{upstream_version}-blue.svg",
              ),
              Path("README-EN.md"): (
                  r"version-v\d+\.\d+\.\d+-blue\.svg",
                  f"version-v{upstream_version}-blue.svg",
              ),
          }

          for path, (pattern, replacement) in replacements.items():
              if not path.exists():
                  print(f"Warning: {path} not found; skip.")
                  continue
              if replace_once(path, pattern, replacement):
                  changed += 1

          print(f"Program version alignment finished: upstream={upstream_version}, changed_files={changed}")
          PY

          WORKFLOW_CHANGED=$(
            {
              git diff --name-only -- .github/workflows
              git diff --name-only --cached -- .github/workflows
            } | sed '/^$/d' | sort -u
          )

          if [ -n "$WORKFLOW_CHANGED" ]; then
            IGNORED_COUNT=$(printf "%s\n" "$WORKFLOW_CHANGED" | sed '/^$/d' | wc -l | tr -d ' ')
            echo "ignored_workflow_count=$IGNORED_COUNT" >> "$GITHUB_OUTPUT"
            {
              echo "ignored_workflow_files<<EOF"
              printf "%s\n" "$WORKFLOW_CHANGED"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"

            git restore --source=HEAD --staged --worktree .github/workflows
            echo "Ignored upstream workflow changes."
          else
            echo "ignored_workflow_count=0" >> "$GITHUB_OUTPUT"
            {
              echo "ignored_workflow_files<<EOF"
              echo ""
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

          if git diff --quiet && git diff --cached --quiet; then
            echo "effective_changes=false" >> "$GITHUB_OUTPUT"
            echo "No effective changes after filtering workflows."
            if git rev-parse -q --verify MERGE_HEAD >/dev/null; then
              git merge --abort || git reset --merge
            fi
          else
            echo "Running post-merge smoke checks before commit."
            python3 -m pip install --upgrade pip
            python3 -m pip install -r requirements.txt
            python3 -m compileall -q trendradar mcp_server
            python3 -m trendradar --help >/tmp/trendradar-help.txt
            python3 - <<'PY'
          from datetime import datetime
          from pathlib import Path

          import yaml

          import trendradar.__main__ as main_mod
          from trendradar.core.scheduler import Scheduler

          assert callable(getattr(main_mod, "fetch_with_fallback", None)), "fetch_with_fallback is not imported"

          class DummyStorage:
              def has_period_executed(self, date_str, period_key, action):
                  return False

              def record_period_execution(self, date_str, period_key, action):
                  return True

          timeline = yaml.safe_load(Path("config/timeline.yaml").read_text(encoding="utf-8"))
          fixed_now = datetime(2026, 6, 28, 19, 45, 17)
          resolved = Scheduler(
              {"enabled": True, "preset": "tcc_custom"},
              timeline,
              DummyStorage(),
              lambda: fixed_now,
          ).resolve()
          assert resolved.push is True, "tcc_custom weekend push window should push"
          assert resolved.report_mode == "daily", "tcc_custom weekend report_mode should be daily"
          print("Post-merge smoke checks passed.")
          PY
            git commit --no-edit
            echo "effective_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push merged master
        if: steps.check.outputs.has_changes == 'true' && steps.merge.outputs.effective_changes == 'true'
        run: |
          git push origin master

      - name: Notify ignored workflow changes to Feishu
        if: steps.check.outputs.has_changes == 'true' && steps.merge.outputs.ignored_workflow_count != '0'
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          UPSTREAM_REF: ${{ steps.check.outputs.upstream_ref }}
          IGNORED_WORKFLOW_COUNT: ${{ steps.merge.outputs.ignored_workflow_count }}
          IGNORED_WORKFLOW_FILES: ${{ steps.merge.outputs.ignored_workflow_files }}
        run: |
          if [ -z "$FEISHU_WEBHOOK_URL" ]; then
            echo "Warning: FEISHU_WEBHOOK_URL is not configured, skip notification."
            exit 0
          fi

          MESSAGE=$(cat <<EOF
          [@sync notice] Ignored upstream workflow changes and continued sync.
          Repository: $GITHUB_REPOSITORY
          Branch: $GITHUB_REF_NAME
          Upstream ref: $UPSTREAM_REF
          Ignored workflow file count: $IGNORED_WORKFLOW_COUNT
          Ignored workflow files:
          $IGNORED_WORKFLOW_FILES
          Result: .github/workflows changes were ignored. Non-workflow changes were processed.
          EOF
          )

          PAYLOAD=$(MESSAGE="$MESSAGE" python - <<'PY'
          import json
          import os
          print(json.dumps({"msg_type": "text", "content": {"text": os.environ["MESSAGE"]}}, ensure_ascii=False))
          PY
          )

          if ! curl -sSf -X POST -H "Content-Type: application/json" -d "$PAYLOAD" "$FEISHU_WEBHOOK_URL" >/dev/null; then
            echo "Warning: Feishu notification request failed."
          fi

      - name: Notify sync failure to Feishu
        if: failure() && steps.check.outputs.has_changes == 'true'
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          UPSTREAM_REF: ${{ steps.check.outputs.upstream_ref }}
          CONFLICT_FILES: ${{ steps.merge.outputs.conflict_files }}
        run: |
          if [ -z "$FEISHU_WEBHOOK_URL" ]; then
            echo "Warning: FEISHU_WEBHOOK_URL is not configured, skip failure notification."
            exit 0
          fi

          MESSAGE=$(cat <<EOF
          [@sync alert] Upstream sync failed before push.
          Repository: $GITHUB_REPOSITORY
          Branch: $GITHUB_REF_NAME
          Upstream ref: $UPSTREAM_REF
          Conflict files:
          $CONFLICT_FILES
          Result: master was not changed. Please resolve the conflict or smoke-check failure manually.
          EOF
          )

          PAYLOAD=$(MESSAGE="$MESSAGE" python - <<'PY'
          import json
          import os
          print(json.dumps({"msg_type": "text", "content": {"text": os.environ["MESSAGE"]}}, ensure_ascii=False))
          PY
          )

          if ! curl -sSf -X POST -H "Content-Type: application/json" -d "$PAYLOAD" "$FEISHU_WEBHOOK_URL" >/dev/null; then
            echo "Warning: Feishu failure notification request failed."
          fi

      - name: No changes
        if: steps.check.outputs.has_changes != 'true'
        run: |
          echo "Upstream has no new changes. Skip push."
